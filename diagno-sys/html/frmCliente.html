<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoSys - Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0f0f0f;
            --ink-soft: #4a4a52;
            --ink-mute: #9898a6;
            --surface: #f6f6f8;
            --white: #ffffff;
            --line: #e4e4ea;
        }

        body {
            background: var(--surface);
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--line);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { display: flex; align-items: center; gap: 12px; }

        .brand-icon {
            width: 32px; height: 32px;
            background: var(--ink);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .brand-name { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; color: var(--ink); }
        .brand-divider { width: 1px; height: 18px; background: var(--line); }
        .brand-section { font-size: 12px; color: var(--ink-mute); letter-spacing: 0.04em; font-family: 'DM Mono', monospace; }

        .btn-back {
            background: none; border: 1px solid var(--line); border-radius: 8px;
            padding: 6px 14px; font-size: 12px; font-weight: 500;
            font-family: 'DM Sans', sans-serif; color: var(--ink-soft);
            cursor: pointer; transition: all 0.18s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-back:hover { background: var(--surface); border-color: #c4c4d0; color: var(--ink); }

        /* ── MAIN ── */
        .main { padding: 2.5rem 2rem; max-width: 1040px; margin: 0 auto; }

        .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 4px; }
        .page-sub { font-size: 13px; color: var(--ink-mute); margin-bottom: 2rem; }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex; gap: 10px; align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative; flex: 1; min-width: 200px;
        }

        .search-wrap svg {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            pointer-events: none; opacity: 0.4;
        }

        .search-input {
            width: 100%; padding: 9px 12px 9px 36px;
            border: 1px solid var(--line); border-radius: 9px;
            background: var(--white); font-size: 14px;
            font-family: 'DM Sans', sans-serif; color: var(--ink);
            outline: none; transition: border-color 0.18s;
        }
        .search-input:focus { border-color: #c4c4d0; }
        .search-input::placeholder { color: var(--ink-mute); }

        .btn-add {
            background: var(--ink); color: white; border: none;
            border-radius: 9px; padding: 9px 16px;
            font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: all 0.18s;
            display: flex; align-items: center; gap: 7px; white-space: nowrap;
        }
        .btn-add:hover { background: #2a2a2a; }

        /* ── TABLE CARD ── */
        .table-card {
            background: var(--white); border: 1px solid var(--line);
            border-radius: 14px; overflow: hidden;
        }

        .table-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--line);
        }

        .table-label {
            font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--ink-mute);
            font-family: 'DM Mono', monospace;
        }

        .count-badge {
            font-size: 11px; font-weight: 500; color: var(--ink-mute);
            font-family: 'DM Mono', monospace;
            background: var(--surface); border: 1px solid var(--line);
            border-radius: 999px; padding: 2px 10px;
        }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            padding: 10px 16px; font-size: 11px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.07em;
            color: var(--ink-mute); border-bottom: 1px solid var(--line);
            font-family: 'DM Mono', monospace; text-align: left;
            background: var(--white);
        }

        tbody tr {
            border-bottom: 1px solid var(--line); transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--surface); }

        tbody td {
            padding: 12px 16px; font-size: 13.5px; color: var(--ink);
            vertical-align: middle;
        }

        .td-id { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink-mute); }
        .td-name { font-weight: 500; }

        /* Action buttons en tabla */
        .action-btns { display: flex; gap: 6px; }

        .btn-edit, .btn-del {
            border: 1px solid var(--line); border-radius: 7px;
            padding: 5px 10px; font-size: 11px; font-weight: 500;
            font-family: 'DM Sans', sans-serif; cursor: pointer;
            transition: all 0.15s; display: flex; align-items: center; gap: 5px;
            background: none;
        }
        .btn-edit { color: var(--ink-soft); }
        .btn-edit:hover { background: var(--surface); border-color: #c4c4d0; color: var(--ink); }
        .btn-del { color: #9b1c1c; border-color: #fecaca; }
        .btn-del:hover { background: #fef2f2; border-color: #fca5a5; }

        /* Empty state */
        .empty-state {
            padding: 3rem; text-align: center; color: var(--ink-mute);
        }
        .empty-state p { font-size: 14px; margin-top: 8px; }

        /* ── MODAL OVERLAY ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.35); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: var(--white); border-radius: 16px;
            border: 1px solid var(--line); padding: 2rem;
            width: 100%; max-width: 480px; margin: 1rem;
            max-height: 90vh; overflow-y: auto;
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }

        .btn-close-modal {
            background: none; border: none; cursor: pointer; padding: 4px;
            color: var(--ink-mute); border-radius: 6px; transition: background 0.15s;
        }
        .btn-close-modal:hover { background: var(--surface); }

        /* Form fields en modal */
        .field { margin-bottom: 1.25rem; }

        .field label {
            display: block; font-size: 10px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--ink-mute); margin-bottom: 5px;
            font-family: 'DM Mono', monospace;
        }

        .field input {
            width: 100%; padding: 9px 0;
            border: none; border-bottom: 1px solid var(--line);
            outline: none; font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            background: transparent; color: var(--ink);
            transition: border-color 0.2s;
        }
        .field input:focus { border-bottom-color: var(--ink); }
        .field input[readonly] { color: var(--ink-mute); border-bottom-style: dashed; cursor: not-allowed; }

        .modal-footer {
            display: flex; gap: 8px; margin-top: 1.75rem; justify-content: flex-end;
        }

        .btn-cancel {
            background: none; border: 1px solid var(--line); border-radius: 8px;
            padding: 9px 18px; font-size: 13px; font-weight: 500;
            font-family: 'DM Sans', sans-serif; color: var(--ink-soft); cursor: pointer;
            transition: all 0.15s;
        }
        .btn-cancel:hover { background: var(--surface); }

        .btn-confirm {
            background: var(--ink); color: white; border: none;
            border-radius: 8px; padding: 9px 20px; font-size: 13px;
            font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer;
            transition: all 0.18s;
        }
        .btn-confirm:hover { background: #2a2a2a; }

        /* Confirm delete modal */
        .modal-del-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: #fef2f2; display: flex; align-items: center;
            justify-content: center; margin-bottom: 1rem;
        }

        .btn-confirm-del {
            background: #dc2626; color: white; border: none;
            border-radius: 8px; padding: 9px 20px; font-size: 13px;
            font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer;
            transition: all 0.18s;
        }
        .btn-confirm-del:hover { background: #b91c1c; }

        /* Toast */
        .toast-wrap {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            background: var(--ink); color: white; border-radius: 10px;
            padding: 12px 18px; font-size: 13px; font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            animation: slideIn 0.2s ease; max-width: 300px;
        }
        .toast.error { background: #dc2626; }

        @keyframes slideIn {
            from { transform: translateY(12px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        @media (max-width: 576px) {
            .topbar { padding: 0 1rem; }
            .main { padding: 1.5rem 1rem; }
            .brand-section, .brand-divider { display: none; }
            thead th:nth-child(4), tbody td:nth-child(4),
            thead th:nth-child(5), tbody td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M2 17l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="brand-name">DiagnoSys</span>
            <div class="brand-divider"></div>
            <span class="brand-section">Clientes</span>
        </div>
        <button class="btn-back" onclick="window.location.href='webmed.html'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Volver
        </button>
    </nav>

    <!-- MAIN -->
    <div class="main">
        <p class="page-title">Clientes</p>
        <p class="page-sub">Registro y gestión de la base de datos de clientes.</p>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-wrap">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7" stroke="#0f0f0f" stroke-width="1.7"/>
                    <path d="M16.5 16.5L21 21" stroke="#0f0f0f" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nombre, cédula o teléfono...">
            </div>
            <button class="btn-add" onclick="abrirModalAgregar()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Agregar cliente
            </button>
        </div>

        <!-- TABLE CARD -->
        <div class="table-card">
            <div class="table-header">
                <span class="table-label">Directorio</span>
                <span class="count-badge" id="countBadge">0 clientes</span>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Cédula</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Correo</th>
                            <th>Dirección</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tablaClientes">
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="margin: 0 auto; display: block; opacity: 0.3;">
                                        <circle cx="12" cy="8" r="4" stroke="#0f0f0f" stroke-width="1.5"/>
                                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#0f0f0f" stroke-width="1.5" stroke-linecap="round"/>
                                    </svg>
                                    <p>Cargando clientes...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL AGREGAR / EDITAR -->
    <div class="modal-overlay" id="modalFormOverlay">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="modalFormTitle">Agregar cliente</span>
                <button class="btn-close-modal" onclick="cerrarModalForm()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <form id="formCliente" onsubmit="guardarCliente(event)">
                <div class="row g-3">
                    <div class="col-12">
                        <div class="field">
                            <label>Cédula / ID</label>
                            <input type="text" id="f_IdCliente" placeholder="Ej: 1-2345-6789" maxlength="12" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="field">
                            <label>Nombre</label>
                            <input type="text" id="f_NombreCliente" placeholder="Ej: Juan" maxlength="10" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="field">
                            <label>Apellido</label>
                            <input type="text" id="f_ApellidoCliente" placeholder="Ej: Pérez" maxlength="10" required>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="field">
                            <label>Teléfono</label>
                            <input type="number" id="f_Telefono" placeholder="Ej: 88887777" required>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="field">
                            <label>Correo electrónico</label>
                            <input type="email" id="f_Correo" placeholder="Ej: juan@mail.com" maxlength="20">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="field">
                            <label>Dirección</label>
                            <input type="text" id="f_Direccion" placeholder="Ej: San José, Costa Rica" maxlength="20">
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="cerrarModalForm()">Cancelar</button>
                    <button type="submit" class="btn-confirm" id="btnConfirmForm">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL CONFIRMAR ELIMINAR -->
    <div class="modal-overlay" id="modalDelOverlay">
        <div class="modal-box" style="max-width: 380px;">
            <div class="modal-del-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#dc2626" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10 11v6M14 11v6" stroke="#dc2626" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
            </div>
            <p style="font-size: 15px; font-weight: 600; margin-bottom: 6px;">Eliminar cliente</p>
            <p style="font-size: 13px; color: var(--ink-mute); line-height: 1.6;" id="modalDelMsg">¿Está seguro de que desea eliminar este cliente? Esta acción no se puede deshacer.</p>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="cerrarModalDel()">Cancelar</button>
                <button type="button" class="btn-confirm-del" id="btnConfirmDel">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- TOASTS -->
    <div class="toast-wrap" id="toastWrap"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:3000/cliente';

        if (!localStorage.getItem('diagnoSys_user')) window.location.href = 'index.html';

        let todosClientes = [];
        let modoEdicion = false;

        // ── TOAST ──
        function toast(msg, tipo = 'ok') {
            const wrap = document.getElementById('toastWrap');
            const el = document.createElement('div');
            el.className = 'toast' + (tipo === 'error' ? ' error' : '');
            el.textContent = msg;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // ── CARGAR CLIENTES ──
        async function cargarClientes() {
            try {
                const res = await fetch(API);
                if (!res.ok) throw new Error();
                todosClientes = await res.json();
                renderTabla(todosClientes);
            } catch {
                toast('Error al cargar clientes', 'error');
                document.getElementById('tablaClientes').innerHTML = `
                    <tr><td colspan="6">
                        <div class="empty-state">
                            <p>No se pudo conectar con el servidor.</p>
                        </div>
                    </td></tr>`;
            }
        }

        // ── RENDER TABLA ──
        function renderTabla(lista) {
            const tbody = document.getElementById('tablaClientes');
            const badge = document.getElementById('countBadge');
            badge.textContent = `${lista.length} cliente${lista.length !== 1 ? 's' : ''}`;

            if (lista.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="6">
                        <div class="empty-state">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="margin:0 auto;display:block;opacity:0.25;">
                                <circle cx="12" cy="8" r="4" stroke="#0f0f0f" stroke-width="1.5"/>
                                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#0f0f0f" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            <p>No hay clientes registrados.</p>
                        </div>
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = lista.map(c => `
                <tr>
                    <td class="td-id">${c.IdCliente}</td>
                    <td class="td-name">${c.NombreCliente} ${c.ApellidoCliente}</td>
                    <td>${c.Telefono}</td>
                    <td>${c.Correo || '<span style="color:var(--ink-mute)">—</span>'}</td>
                    <td>${c.Direccion || '<span style="color:var(--ink-mute)">—</span>'}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="abrirModalEditar('${c.IdCliente}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Editar
                            </button>
                            <button class="btn-del" onclick="abrirModalDel('${c.IdCliente}', '${c.NombreCliente} ${c.ApellidoCliente}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                                    <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Eliminar
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ── BÚSQUEDA ──
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            if (!q) { renderTabla(todosClientes); return; }
            const filtrados = todosClientes.filter(c =>
                c.IdCliente.toLowerCase().includes(q) ||
                c.NombreCliente.toLowerCase().includes(q) ||
                c.ApellidoCliente.toLowerCase().includes(q) ||
                String(c.Telefono).includes(q) ||
                (c.Correo && c.Correo.toLowerCase().includes(q))
            );
            renderTabla(filtrados);
        });

        // ── MODAL AGREGAR ──
        function abrirModalAgregar() {
            modoEdicion = false;
            document.getElementById('modalFormTitle').textContent = 'Agregar cliente';
            document.getElementById('btnConfirmForm').textContent = 'Guardar';
            document.getElementById('formCliente').reset();
            document.getElementById('f_IdCliente').removeAttribute('readonly');
            document.getElementById('modalFormOverlay').classList.add('active');
        }

        // ── MODAL EDITAR ──
        function abrirModalEditar(id) {
            const c = todosClientes.find(x => x.IdCliente === id);
            if (!c) return;
            modoEdicion = true;
            document.getElementById('modalFormTitle').textContent = 'Editar cliente';
            document.getElementById('btnConfirmForm').textContent = 'Actualizar';
            document.getElementById('f_IdCliente').value = c.IdCliente;
            document.getElementById('f_IdCliente').setAttribute('readonly', true);
            document.getElementById('f_NombreCliente').value = c.NombreCliente;
            document.getElementById('f_ApellidoCliente').value = c.ApellidoCliente;
            document.getElementById('f_Telefono').value = c.Telefono;
            document.getElementById('f_Correo').value = c.Correo || '';
            document.getElementById('f_Direccion').value = c.Direccion || '';
            document.getElementById('modalFormOverlay').classList.add('active');
        }

        function cerrarModalForm() {
            document.getElementById('modalFormOverlay').classList.remove('active');
        }

        // ── GUARDAR (CREAR O EDITAR) ──
        async function guardarCliente(e) {
            e.preventDefault();
            const datos = {
                IdCliente:       document.getElementById('f_IdCliente').value.trim(),
                NombreCliente:   document.getElementById('f_NombreCliente').value.trim(),
                ApellidoCliente: document.getElementById('f_ApellidoCliente').value.trim(),
                Telefono:        parseInt(document.getElementById('f_Telefono').value),
                Correo:          document.getElementById('f_Correo').value.trim(),
                Direccion:       document.getElementById('f_Direccion').value.trim(),
            };

            try {
                let res;
                if (modoEdicion) {
                    // PATCH con los mismos datos al SP de modificar vía endpoint POST o PATCH
                    res = await fetch(`${API}/${datos.IdCliente}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(datos)
                    });
                } else {
                    res = await fetch(API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(datos)
                    });
                }

                if (res.ok) {
                    cerrarModalForm();
                    toast(modoEdicion ? '✓ Cliente actualizado' : '✓ Cliente registrado');
                    cargarClientes();
                } else {
                    const err = await res.json().catch(() => ({}));
                    toast(err.message || 'Error al guardar', 'error');
                }
            } catch {
                toast('Error de conexión', 'error');
            }
        }

        // ── MODAL ELIMINAR ──
        let idParaEliminar = null;

        function abrirModalDel(id, nombre) {
            idParaEliminar = id;
            document.getElementById('modalDelMsg').textContent =
                `¿Desea eliminar a "${nombre}" (${id})? Esta acción no se puede deshacer.`;
            document.getElementById('modalDelOverlay').classList.add('active');
        }

        function cerrarModalDel() {
            idParaEliminar = null;
            document.getElementById('modalDelOverlay').classList.remove('active');
        }

        document.getElementById('btnConfirmDel').addEventListener('click', async () => {
            if (!idParaEliminar) return;
            try {
                const res = await fetch(`${API}/${idParaEliminar}`, { method: 'DELETE' });
                if (res.ok) {
                    cerrarModalDel();
                    toast('✓ Cliente eliminado');
                    cargarClientes();
                } else {
                    toast('Error al eliminar', 'error');
                }
            } catch {
                toast('Error de conexión', 'error');
            }
        });

        // Cerrar modales con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { cerrarModalForm(); cerrarModalDel(); }
        });

        // Cerrar modales al hacer click afuera
        document.getElementById('modalFormOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) cerrarModalForm();
        });
        document.getElementById('modalDelOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) cerrarModalDel();
        });

        // ── INIT ──
        cargarClientes();
    </script>
</body>
</html>
