<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DiagnoSys - Login</title>
</head>
<body style="background-color: #fafafa; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="background: white; padding: 40px; border-radius: 10px; border: 1px solid #eee; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="font-weight: 300; text-align: center; margin-bottom: 30px;">Inicio de Sesión</h2>
        <form id="loginForm">
            <label style="font-size: 11px; color: #999; text-transform: uppercase;">Usuario</label>
            <input type="text" id="IdUsuario" required style="width: 100%; padding: 10px 0; margin-bottom: 20px; border: none; border-bottom: 1px solid #ddd; outline: none;">

            <label style="font-size: 11px; color: #999; text-transform: uppercase;">Contraseña</label>
            <input type="password" id="password" required style="width: 100%; padding: 10px 0; margin-bottom: 30px; border: none; border-bottom: 1px solid #ddd; outline: none;">

            <button type="submit" style="width: 100%; background: #333; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold;">ENTRAR</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('IdUsuario').value;
    const pass = document.getElementById('password').value;

    try {
        const response = await fetch('http://localhost:3000/usuario/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, pass: pass })
        });

        if (response.ok) {
            const usuario = await response.json();
    
            localStorage.setItem('diagnoSys_user', usuario.NombreUsuario);
            // IMPORTANTE: Usamos el IdRol que procesamos en el servicio
            localStorage.setItem('userRole', usuario.IdRol.toString()); 
    
            window.location.href = 'webmed.html'; 
        } else {
            alert("Usuario o contraseña incorrectos");
        }
    } catch (error) {
        alert("Error de conexión con el servidor de DiagnoSys");
    }
    });
    </script>
</body>
</html>
