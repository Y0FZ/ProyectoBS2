<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoSys - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 600;
            color: #2d3436;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .brand-subtitle {
            text-align: center;
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px 0 0 10px;
        }
        .btn-login {
            background: #2d3436;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            margin-top: 1rem;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background: #000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <i class="fas fa-stethoscope text-primary"></i> DiagnoSys
        </div>
        <p class="brand-subtitle">Bienvenido, identifíquese para continuar</p>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" id="IdUsuario" class="form-control" placeholder="Nombre de usuario" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px;">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i> ENTRAR
            </button>
        </form>
        
        <div class="text-center mt-4">
            <small class="text-muted">¿Problemas con el acceso? Contacte a soporte.</small>
        </div>
    </div>

    <script>
        // 1. Lógica del ojo (Mostrar/Ocultar)
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        // 2. Lógica de Login (Fetch)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('IdUsuario').value;
            const pass = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/usuario/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, pass: pass })
                });

                if (response.ok) {
                    const usuario = await response.json();
                    localStorage.setItem('diagnoSys_user', usuario.NombreUsuario);
                    localStorage.setItem('userRole', usuario.IdRol.toString()); 
                    window.location.href = 'webmed.html'; 
                } else {
                    alert("⚠️ Usuario o contraseña incorrectos");
                }
            } catch (error) {
                alert("❌ Error de conexión con el servidor");
            }
        });
    </script>
</body>
</html>
