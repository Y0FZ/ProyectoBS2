<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoSys - Nueva Orden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0f0f0f;
            --ink-soft: #4a4a52;
            --ink-mute: #9898a6;
            --surface: #f6f6f8;
            --white: #ffffff;
            --line: #e4e4ea;
        }

        body {
            background: var(--surface);
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--line);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--ink);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--ink);
        }

        .brand-divider {
            width: 1px;
            height: 18px;
            background: var(--line);
        }

        .brand-section {
            font-size: 12px;
            color: var(--ink-mute);
            letter-spacing: 0.04em;
            font-family: 'DM Mono', monospace;
        }

        .btn-back {
            background: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            color: var(--ink-soft);
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            background: var(--surface);
            border-color: #c4c4d0;
            color: var(--ink);
        }

        /* ── MAIN ── */
        .main {
            padding: 2.5rem 2rem;
            max-width: 760px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 13px;
            color: var(--ink-mute);
            margin-bottom: 2rem;
        }

        /* ── FORM CARD ── */
        .form-card {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 2rem 2rem;
        }

        .section-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-mute);
            font-family: 'DM Mono', monospace;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--line);
        }

        /* ── FIELDS ── */
        .field {
            margin-bottom: 1.5rem;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-mute);
            margin-bottom: 6px;
            font-family: 'DM Mono', monospace;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid var(--line);
            outline: none;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            background: transparent;
            color: var(--ink);
            transition: border-color 0.2s;
            border-radius: 0;
            appearance: none;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-bottom-color: var(--ink);
        }

        .field input[readonly] {
            color: var(--ink-mute);
            border-bottom-style: dashed;
            cursor: not-allowed;
        }

        .field textarea {
            resize: none;
            line-height: 1.6;
        }

        .field select {
            cursor: pointer;
        }

        /* Input con botón + */
        .input-with-btn {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-with-btn input {
            flex: 1;
        }

        .btn-mini {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--ink);
            color: white;
            border: none;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.18s;
        }

        .btn-mini:hover { background: #333; }

        /* Campo oculto de ID */
        .field input[type="hidden"],
        #IdClienteD,
        #SerieEquipo {
            display: none;
        }

        /* Separador entre secciones */
        .field-divider {
            border: none;
            border-top: 1px solid var(--line);
            margin: 2rem 0;
        }

        /* ── SUBMIT ── */
        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: #2a2a2a;
            transform: translateY(-1px);
        }

        @media (max-width: 576px) {
            .topbar { padding: 0 1rem; }
            .main { padding: 1.5rem 1rem; }
            .form-card { padding: 1.5rem 1.25rem; }
            .brand-section, .brand-divider { display: none; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M2 17l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="brand-name">DiagnoSys</span>
            <div class="brand-divider"></div>
            <span class="brand-section">Nueva orden</span>
        </div>

        <button class="btn-back" onclick="window.location.href='webmed.html'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Volver
        </button>
    </nav>

    <!-- MAIN -->
    <div class="main">
        <p class="page-title">Nueva orden de servicio</p>
        <p class="page-sub">Complete los datos para registrar el equipo en diagnóstico.</p>

        <div class="form-card">
            <form id="formOrden">

                <!-- Sección: Info general -->
                <div class="section-label">Información general</div>

                <div class="row g-4 mb-2">
                    <div class="col-6">
                        <div class="field">
                            <label>N° de orden</label>
                            <input type="text" id="IdOrden" readonly>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="field">
                            <label>Fecha de recepción</label>
                            <input type="date" id="FechaCreacion" readonly>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label>Prioridad</label>
                    <select id="Prioridad" required>
                        <option value="" disabled selected>Cargando...</option>
                    </select>
                </div>

                <hr class="field-divider">

                <!-- Sección: Cliente y equipo -->
                <div class="section-label">Cliente y equipo</div>

                <div class="field">
                    <label>Cliente (nombre o cédula)</label>
                    <div class="input-with-btn">
                        <input type="text" id="busquedaCliente" list="listaClientes" placeholder="Escriba para filtrar..." required>
                        <button type="button" onclick="window.location.href='clientes.html'" class="btn-mini">+</button>
                    </div>
                    <datalist id="listaClientes"></datalist>
                    <input type="text" id="IdClienteD">
                </div>

                <div class="field">
                    <label>Equipo / dispositivo</label>
                    <div class="input-with-btn">
                        <input type="text" id="busquedaEquipo" list="listaEquipos" placeholder="Buscar por serie o modelo..." required>
                        <button type="button" onclick="window.location.href='equipos.html'" class="btn-mini">+</button>
                    </div>
                    <datalist id="listaEquipos"></datalist>
                    <input type="text" id="SerieEquipo">
                </div>

                <hr class="field-divider">

                <!-- Sección: Descripción -->
                <div class="section-label">Detalles técnicos</div>

                <div class="field">
                    <label>Estado físico del artículo</label>
                    <textarea id="EstadoRecepcion" rows="2" placeholder="Ej: Rayones en tapa, falta cargador..."></textarea>
                </div>

                <div class="field">
                    <label>Descripción de la falla</label>
                    <textarea id="Descripcion" rows="2" placeholder="Detalle el problema técnico..."></textarea>
                </div>

                <button type="submit" class="btn-save">Registrar orden de servicio</button>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (!localStorage.getItem('diagnoSys_user')) {
            window.location.href = 'index.html';
        }

        async function inicializarFormulario() {
            const fechaLocal = new Date();
            const offset = fechaLocal.getTimezoneOffset();
            const fechaAjustada = new Date(fechaLocal.getTime() - (offset * 60 * 1000));
            document.getElementById('FechaCreacion').value = fechaAjustada.toISOString().split('T')[0];

            try {
                const resId = await fetch('http://localhost:3000/orden-diagnostico/proximo-id');
                if (resId.ok) {
                    const siguienteId = await resId.json();
                    document.getElementById('IdOrden').value = siguienteId;
                }
            } catch (error) { console.error("Error al cargar ID:", error); }

            try {
                const resPrio = await fetch('http://localhost:3000/prioridad');
                const prioridades = await resPrio.json();
                const selectPrio = document.getElementById('Prioridad');
                selectPrio.innerHTML = '<option value="" disabled selected>Seleccione...</option>';
                prioridades.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.IdPrioridad;
                    opt.textContent = p.NivelPrioridad;
                    selectPrio.appendChild(opt);
                });
            } catch (e) { console.error("Error Prioridades:", e); }

            try {
                const resCli = await fetch('http://localhost:3000/cliente');
                const clientes = await resCli.json();
                const dl = document.getElementById('listaClientes');
                clientes.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = `${c.Nombre} ${c.Apellidos} (${c.Cedula})`;
                    opt.setAttribute('data-id', c.IdCliente || c.Cedula);
                    dl.appendChild(opt);
                });
            } catch (e) { console.error("Error Clientes:", e); }

            try {
                const resEq = await fetch('http://localhost:3000/articulo-equipo');
                const equipos = await resEq.json();
                const dlEq = document.getElementById('listaEquipos');
                equipos.forEach(e => {
                    const opt = document.createElement('option');
                    opt.value = `${e.Marca} ${e.Modelo} - S/N: ${e.NumeroSerie}`;
                    opt.setAttribute('data-id', e.NumeroSerie);
                    dlEq.appendChild(opt);
                });
            } catch (err) { console.error("Error Equipos:", err); }
        }

        function configurarBuscadores() {
            document.getElementById('busquedaCliente').addEventListener('input', (e) => {
                const val = e.target.value;
                const options = document.getElementById('listaClientes').options;
                for (let i = 0; i < options.length; i++) {
                    if (options[i].value === val) {
                        document.getElementById('IdClienteD').value = options[i].getAttribute('data-id');
                        break;
                    }
                }
            });

            document.getElementById('busquedaEquipo').addEventListener('input', (e) => {
                const val = e.target.value;
                const options = document.getElementById('listaEquipos').options;
                for (let i = 0; i < options.length; i++) {
                    if (options[i].value === val) {
                        document.getElementById('SerieEquipo').value = options[i].getAttribute('data-id');
                        break;
                    }
                }
            });
        }

        document.getElementById('formOrden').addEventListener('submit', async (e) => {
            e.preventDefault();

            const serie = document.getElementById('SerieEquipo').value;
            const cliente = document.getElementById('IdClienteD').value;

            if (!serie || serie === "0" || !cliente || cliente === "0") {
                alert("⚠️ Debes seleccionar un equipo y un cliente de la lista.");
                return;
            }

            const datos = {
                IdOrden: parseInt(document.getElementById('IdOrden').value),
                FechaCreacion: document.getElementById('FechaCreacion').value,
                Descripcion: document.getElementById('Descripcion').value,
                EstadoRecepcion: document.getElementById('EstadoRecepcion').value || "No especificado",
                SerieEquipo: serie,
                IdClienteD: cliente,
                Prioridad: parseInt(document.getElementById('Prioridad').value)
            };

            try {
                const res = await fetch('http://localhost:3000/orden-diagnostico', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (res.ok) {
                    alert("✅ Orden #" + datos.IdOrden + " registrada con éxito");
                    window.location.reload();
                } else {
                    const err = await res.json();
                    alert("❌ Error: " + (err.message || "No se pudo guardar"));
                }
            } catch (error) {
                alert("❌ Error de conexión");
            }
        });

        window.onload = () => {
            inicializarFormulario();
            configurarBuscadores();
        };
    </script>
</body>
</html>
