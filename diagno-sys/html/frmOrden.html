<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DiagnoSys - Panel de Control</title>
</head>
<body style="background-color: #fafafa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px;">

    <div style="max-width: 900px; margin: 0 auto 30px auto; display: flex; justify-content: space-between; align-items: center;">
    <h1 style="font-weight: 300; color: #333; margin: 0; font-size: 24px;">DiagnoSys <span style="color: #999; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">| Orden</span></h1>
    <button onclick="window.location.href='webmed.html'" style="background: none; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 10px; letter-spacing: 1px; color: #666; font-weight: bold;">VOLVER AL MENÚ</button>
    </div>

    <table align="center" width="600" border="0" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border: 1px solid #eee; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);">
        <tr>
            <td>
                <h2 style="font-weight: 300; color: #333; text-align: center; margin-bottom: 40px;">Nueva Orden de Servicio</h2>
                
                <form id="formOrden">
                    <table width="100%" border="0" cellpadding="0" cellspacing="0">
                        <tr>
                            <td width="48%" style="padding-right: 4%;">
                                <label style="font-size: 11px; color: #999; text-transform: uppercase;">N° de Orden</label>
                                <input type="number" id="IdOrden" required style="width: 100%; padding: 10px 0; margin-bottom: 25px; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 15px;">
                            </td>
                            <td width="48%">
                                <label style="font-size: 11px; color: #999; text-transform: uppercase;">Prioridad</label>
                                <select id="Prioridad" required style="width: 100%; padding: 10px 0; margin-bottom: 25px; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 15px; background: none; cursor: pointer;">
                                    <option value="">Cargando...</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <label style="font-size: 11px; color: #999; text-transform: uppercase;">Descripción de la Falla</label>
                                <input type="text" id="Descripcion" required style="width: 100%; padding: 10px 0; margin-bottom: 25px; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 15px;">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" style="position: relative;">
                                <label style="font-size: 11px; color: #999; text-transform: uppercase;">Cliente (Buscar por nombre o cédula)</label>
                                <div style="display: flex; gap: 10px;">
                                    <input type="text" id="busquedaCliente" list="listaClientes" placeholder="Escriba para filtrar..." style="width: 100%; padding: 10px 0; margin-bottom: 25px; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 15px;">
                                    
                                    <button type="button" onclick="window.location.href='clientes.html'" style="background: #333; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer;">+</button>
                                </div>
                                
                                <datalist id="listaClientes"></datalist>
                                
                                <input type="hidden" id="IdClienteD">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <label style="font-size: 11px; color: #999; text-transform: uppercase;">Número de Serie (Equipo)</label>
                                <input type="text" id="SerieEquipo" required style="width: 100%; padding: 10px 0; margin-bottom: 40px; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 15px;">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" align="center">
                                <button type="submit" style="background-color: #333; color: #fff; border: none; padding: 12px 60px; border-radius: 25px; cursor: pointer; font-size: 11px; letter-spacing: 1px; font-weight: bold;">
                                    GUARDAR ORDEN
                                </button>
                            </td>
                        </tr>
                    </table>
                </form>
            </td>
        </tr>
    </table>

    <script>
        // SEGURIDAD: Impedir acceso sin login
        if (!localStorage.getItem('diagnoSys_user')) {
            window.location.href = 'index.html';
        }

        function cerrarSesion() {
            localStorage.removeItem('diagnoSys_user');
            window.location.href = 'index.html';
        }

        async function inicializarFormulario() {
    // 1. Obtener el próximo número de orden
    try {
        const resId = await fetch('http://localhost:3000/orden-diagnostico/proximo-id');
        const proximoId = await resId.json();
        document.getElementById('IdOrden').value = proximoId;
        document.getElementById('IdOrden').readOnly = true; // Evitamos errores manuales
    } catch (e) { console.error("Error al obtener ID de orden"); }

    // 2. Cargar lista de clientes para el buscador
    try {
        const resClientes = await fetch('http://localhost:3000/cliente'); // Asegúrate de tener este endpoint
        const clientes = await resClientes.json();
        const dataList = document.getElementById('listaClientes');
        
        clientes.forEach(c => {
            const option = document.createElement('option');
            // Formato: "Nombre del Cliente (Cédula)"
            option.value = `${c.Nombre} ${c.Apellidos} (${c.Cedula})`;
            option.dataset.id = c.Cedula; // Guardamos la cédula real aquí
            dataList.appendChild(option);
        });
    } catch (e) { console.error("Error al cargar clientes"); }
}

// Lógica para capturar la cédula real cuando el usuario selecciona del menú
document.getElementById('busquedaCliente').addEventListener('input', (e) => {
    const val = e.target.value;
    const opts = document.getElementById('listaClientes').childNodes;
    for (let i = 0; i < opts.length; i++) {
        if (opts[i].value === val) {
            document.getElementById('IdClienteD').value = opts[i].dataset.id;
            break;
        }
    }
});

// Ejecutar al cargar
window.onload = () => {
    if (!localStorage.getItem('diagnoSys_user')) window.location.href = 'index.html';
    cargarPrioridades();
    inicializarFormulario();
};

        // Función para obtener las prioridades desde el Backend (NestJS + SQL Server)
    async function inicializarFormulario() {
        // 1. Cargar el Próximo Número de Orden
        try {
            const resId = await fetch('http://localhost:3000/orden-diagnostico/proximo-id');
            if (resId.ok) {
                const proximoId = await resId.json();
                const inputOrden = document.getElementById('IdOrden');
                inputOrden.value = proximoId;
                inputOrden.readOnly = true; // Recomendado para evitar saltos en la BD
                console.log("✅ Próximo ID cargado:", proximoId);
            }
        } catch (e) {
            console.error("❌ Error obteniendo ID de orden:", e);
        }

        // 2. Cargar Prioridades (Lo que ya tenías)
        await cargarPrioridades();

        // 3. Cargar Clientes para el "Menu"
        await cargarClientesBuscador();
    }

    window.onload = inicializarFormulario;

// Aseguramos que se ejecute apenas cargue la página
window.onload = () => {
    // Verificación de seguridad
    if (!localStorage.getItem('diagnoSys_user')) {
        window.location.href = 'index.html';
    }
    // Carga de datos
    cargarPrioridades();
};

        // GUARDAR ORDEN (NestJS)
        document.getElementById('formOrden').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                IdOrden: parseInt(document.getElementById('IdOrden').value),
                Descripcion: document.getElementById('Descripcion').value,
                EstadoRecepcion: "Recibido en Taller",
                SerieEquipo: document.getElementById('SerieEquipo').value,
                IdClienteD: document.getElementById('IdClienteD').value,
                Prioridad: parseInt(document.getElementById('Prioridad').value)
            };

            try {
                const res = await fetch('http://localhost:3000/orden-diagnostico', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if(res.ok) {
                    alert("✅ Orden guardada correctamente");
                    e.target.reset();
                } else {
                    const err = await res.json();
                    alert("❌ Error: " + (err.message || "No se pudo guardar"));
                }
            } catch (err) {
                alert("Error crítico de conexión.");
            }
        });

        window.onload = cargarPrioridades;

        async function cargarClientesBuscador() {
    const dataList = document.getElementById('listaClientes');
    try {
        const res = await fetch('http://localhost:3000/cliente'); // Verifica que este sea tu endpoint
        const clientes = await res.json();
        
        dataList.innerHTML = ""; // Limpiar
        clientes.forEach(c => {
            const option = document.createElement('option');
            // Mostramos Nombre y Cédula en el menú
            option.value = `${c.Nombre} ${c.Apellidos} - ${c.Cedula}`;
            option.dataset.cedula = c.Cedula; // Guardamos la cédula real
            dataList.appendChild(option);
        });
    } catch (e) {
        console.error("❌ Error cargando clientes:", e);
    }
}

        document.getElementById('busquedaCliente').addEventListener('change', function(e) {
            const val = e.target.value;
            const opts = document.getElementById('listaClientes').childNodes;
            for (let i = 0; i < opts.length; i++) {
                if (opts[i].value === val) {
                    // Si el valor coincide, guardamos la cédula en el input que se enviará
                    document.getElementById('IdClienteD').value = opts[i].dataset.cedula;
                    break;
                }
            }
        });

    </script>
</body>
</html>
