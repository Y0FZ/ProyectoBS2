<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DiagnoSys - Registro</title>
</head>
<body style="background-color: #fafafa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px;">

    <table align="center" width="400" border="0" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border: 1px solid #eee; padding: 40px; border-radius: 10px;">
        <tr>
            <td>
                <h2 style="font-weight: 300; color: #333; text-align: center; margin-bottom: 30px;">Registro de Entrada</h2>
                <form id="registroForm">
                    <label style="font-size: 11px; color: #999; text-transform: uppercase;">ID Cliente</label>
                    <input type="text" id="IdCliente" required style="width: 100%; padding: 10px 0; margin-bottom: 20px; border: none; border-bottom: 1px solid #ddd; outline: none;">

                    <label style="font-size: 11px; color: #999; text-transform: uppercase;">Dispositivo</label>
                    <select id="Categoria" style="width: 100%; padding: 10px 0; margin-bottom: 20px; border: none; border-bottom: 1px solid #ddd; background: none; outline: none;">
                        <option value="Laptop">Laptop / PC</option>
                        <option value="Impresora">Impresora</option>
                        <option value="Smartphone">Smartphone</option>
                    </select>

                    <label style="font-size: 11px; color: #999; text-transform: uppercase;">Nivel de Urgencia</label>
                    <input type="range" id="Prioridad" min="1" max="10" style="width: 100%; margin: 15px 0 25px 0; accent-color: #333;">

                    <label style="font-size: 11px; color: #999; text-transform: uppercase;">Nombre del Cliente</label>
                    <input type="text" id="Nombre" required style="width: 100%; padding: 10px 0; margin-bottom: 30px; border: none; border-bottom: 1px solid #ddd; outline: none;">

                    <div align="center">
                        <button type="button" onclick="guardarYAbrir()" style="background-color: #333; color: #fff; border: none; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-size: 11px; letter-spacing: 1px; font-weight: bold;">
                            GENERAR TICKET
                        </button>
                    </div>
                </form>
            </td>
        </tr>
    </table>

    <div id="ventanaFlotante" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 999;">
        <table width="100%" height="100%" border="0">
            <tr>
                <td align="center" valign="middle">
                    <table width="320" bgcolor="#ffffff" style="padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                        <tr>
                            <td>
                                <div align="right">
                                    <button onclick="cerrarVentana()" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #ccc;">&times;</button>
                                </div>
                                <h3 style="font-weight: 400; color: #333; margin-top: 0;">Resumen de Orden</h3>
                                <hr style="border: 0; border-top: 1px solid #f0f0f0; margin: 15px 0;">
                                
                                <div id="contenidoTicket" style="font-size: 14px; color: #555; line-height: 2;"></div>
                                
                                <div align="center" style="margin-top: 25px;">
                                    <button onclick="cerrarVentana()" style="background-color: #f0f0f0; color: #333; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-size: 11px;">CERRAR</button>
                                </div>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </div>

    <script>
        function guardarYAbrir() {
            const id = document.getElementById('IdCliente').value;
            const nom = document.getElementById('Nombre').value;
            
            if(!id || !nom) return alert("Completa los datos obligatorios.");

            const datos = {
                id: id,
                equipo: document.getElementById('Categoria').value,
                nivel: document.getElementById('Prioridad').value,
                nombre: nom
            };

            // Guardar en memoria
            localStorage.setItem('ticket_actual', JSON.stringify(datos));

            // Llenar la ventana flotante
            document.getElementById('contenidoTicket').innerHTML = 
                "<b>ID:</b> " + datos.id + "<br>" +
                "<b>Equipo:</b> " + datos.equipo + "<br>" +
                "<b>Prioridad:</b> " + datos.nivel + "/10<br>" +
                "<b>Cliente:</b> " + datos.nombre;

            // Mostrar la ventana
            document.getElementById('ventanaFlotante').style.display = 'block';
        }

        function cerrarVentana() {
            document.getElementById('ventanaFlotante').style.display = 'none';
        }

        // Si hay datos guardados previamente, podrías mostrarlos al cargar
        window.onload = function() {
            if(localStorage.getItem('ticket_actual')) {
                console.log("Hay un ticket pendiente en memoria.");
            }
        };
    </script>
</body>
</html>
