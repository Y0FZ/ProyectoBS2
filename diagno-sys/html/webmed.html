<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoSys - Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text-muted: #8898aa;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px; 
            color: var(--primary);
        }

        .header { 
            max-width: 1000px; 
            margin: 0 auto 50px auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .logo {
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-left: 10px;
        }
        
        .btn-logout { 
            background: white; border: 1px solid #e1e4e8; padding: 10px 20px; 
            border-radius: 12px; cursor: pointer; font-size: 11px; 
            font-weight: 600; text-transform: uppercase; transition: 0.3s; 
        }
        .btn-logout:hover {
            background: #fee;
            color: #d73a49;
            border-color:
            #ffcfcf;
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border: 1px solid transparent;
            text-align: center;
        }

        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            border-color: #e1e4e8;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .card p { margin: 0; color: var(--text-muted); font-size: 14px; line-height: 1.5; }
        
        #adminPanel { display: none; border-top: 4px solid var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">DiagnoSys <span>Panel de Control</span></div>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="grid-container">
        <div class="card" onclick="window.location.href='frmOrden.html'">
            <h3>Nueva Orden</h3>
            <p>Ingreso de equipos a diagnóstico y reparación.</p>
        </div>
        <div class="card" onclick="window.location.href='clientes.html'">
            <h3>Clientes</h3>
            <p>Registro y base de datos de usuarios finales.</p>
        </div>
        <div class="card" onclick="window.location.href='historial.html'">
            <h3>Historial</h3>
            <p>Consulta y actualización de órdenes activas.</p>
        </div>
        <div id="adminPanel" class="card" onclick="window.location.href='usuarios.html'">
            <h3>Administración</h3>
            <p>Gestión de personal, roles y permisos del sistema.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('diagnoSys_user')) window.location.href = 'index.html';
            const userRole = localStorage.getItem('userRole');
            if (userRole === "2") document.getElementById('adminPanel').style.display = 'block';
        });

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
