<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DiagnoSys - Panel Principal</title>
    <style>
        body { background-color: #fafafa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; }
        .header { max-width: 900px; margin: 0 auto 50px auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 300; color: #333; margin: 0; font-size: 24px; }
        .logo span { color: #999; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-outline { background: none; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 10px; letter-spacing: 1px; color: #666; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-outline:hover { background: #f0f0f0; border-color: #bbb; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto; }
        
        .card { background: white; border: 1px solid #eee; padding: 40px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-color: #333; }
        .card h3 { font-weight: 300; color: #333; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-size: 16px; }
        .card p { font-size: 12px; color: #999; margin: 0; }
        
        /* Estilo especial para Admin */
        .admin-only { display: none; border-left: 4px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">DiagnoSys <span>| Inicio</span></h1>
        <button onclick="cerrarSesion()" class="btn-outline">CERRAR SESIÓN</button>
    </div>

    <div class="grid-container">
        <div class="card" onclick="window.location.href='frmOrden.html'">
            <h3>Nueva Orden</h3>
            <p>Registro de ingresos al taller</p>
        </div>

        <div class="card" onclick="window.location.href='clientes.html'">
            <h3>Clientes</h3>
            <p>Administración de base de datos</p>
        </div>

        <div class="card" onclick="window.location.href='historial.html'">
            <h3>Historial</h3>
            <p>Consulta y actualización de estados</p>
        </div>

        <div id="adminPanel" class="card admin-only" onclick="window.location.href='usuarios.html'">
            <h3>Usuarios</h3>
            <p>Gestión de personal y permisos</p>
        </div>
    </div>

    <script>
        // Seguridad y Control de Rol
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('diagnoSys_user')) {
                window.location.href = 'index.html';
            }

            const userRole = localStorage.getItem('userRole'); 
            if (userRole === "1") { // Suponiendo 1 = Admin en tu BD
                document.getElementById('adminPanel').style.display = 'block';
            }
        });

        function cerrarSesion() {
            localStorage.removeItem('diagnoSys_user');
            localStorage.removeItem('userRole');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
